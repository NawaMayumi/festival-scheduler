<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理者ページ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f7f8;
    --surface: #ffffff;
    --border: #e4e4e7;
    --text: #18181b;
    --muted: #71717a;
    --yes: #16a34a; --yes-bg: #dcfce7;
    --maybe: #d97706; --maybe-bg: #fef3c7;
    --no: #dc2626; --no-bg: #fee2e2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter','Noto Sans JP',sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); }

  /* ログイン */
  .login-page {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .login-box { width: 100%; max-width: 360px; }
  .login-box .eyebrow {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); border: 1px solid var(--border); border-radius: 20px;
    padding: 4px 12px; display: inline-block; margin-bottom: 20px;
  }
  .login-box h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 24px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
  .field input {
    width: 100%; padding: 11px 14px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 14px; font-family: inherit; color: var(--text);
    outline: none; transition: border-color 0.15s; background: var(--surface);
  }
  .field input:focus { border-color: var(--text); }
  .btn-login {
    width: 100%; padding: 12px; margin-top: 4px;
    background: var(--text); color: white;
    border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn-login:hover { opacity: 0.8; }
  .login-err { font-size: 12px; color: var(--no); margin-top: 8px; display: none; }
  .back-to-top { display: block; text-align: center; margin-top: 20px; font-size: 12px; color: var(--muted); text-decoration: none; }
  .back-to-top:hover { color: var(--text); }

  /* ダッシュボード */
  #dashboard { display: none; }
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 13px 20px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .topbar h1 { font-size: 15px; font-weight: 700; }
  .topbar-actions { display: flex; gap: 8px; }
  .btn-sm {
    font-size: 12px; font-weight: 500; padding: 6px 12px;
    border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted);
    cursor: pointer; font-family: inherit; transition: color 0.15s, border-color 0.15s;
  }
  .btn-sm:hover { color: var(--text); border-color: #a1a1aa; }
  .btn-sm.danger { color: var(--no); border-color: #fca5a5; }
  .btn-sm.danger:hover { background: var(--no-bg); }

  .content { padding: 16px; max-width: 800px; margin: 0 auto; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px;
  }
  .stat .num { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
  .stat .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .performer-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 10px; overflow: hidden;
  }
  .card-head {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .card-head h2 { font-size: 15px; font-weight: 700; flex: 1; }
  .badge {
    font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px;
    border: 1px solid var(--border); color: var(--muted);
  }
  .badge-code { font-family: 'Inter', monospace; letter-spacing: 1px; }

  .member-row { padding: 14px 16px; border-bottom: 1px solid var(--bg); }
  .member-row:last-child { border-bottom: none; }
  .member-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .member-name { font-size: 14px; font-weight: 600; }
  .updated-at { font-size: 11px; color: var(--muted); margin-left: auto; }
  .status-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .status-chip {
    font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
  }
  .chip-yes   { background: var(--yes-bg); color: var(--yes); }
  .chip-maybe { background: var(--maybe-bg); color: var(--maybe); }
  .chip-no    { background: var(--no-bg); color: var(--no); }
  .chip-na    { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }

  .avail-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .day-col .day-head {
    font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 6px;
    padding-bottom: 4px; border-bottom: 1px solid var(--border);
  }
  .slot-line {
    display: flex; align-items: center; justify-content: space-between;
    padding: 3px 0; font-size: 12px; border-bottom: 1px solid var(--bg);
  }
  .slot-line:last-child { border-bottom: none; }
  .slot-time { color: var(--muted); }
  .s-yes   { color: var(--yes); font-weight: 700; }
  .s-maybe { color: var(--maybe); font-weight: 700; }
  .s-no    { color: var(--no); }
  .s-na    { color: #d4d4d8; }

  #loading { text-align: center; padding: 60px 20px; font-size: 14px; color: var(--muted); }
  .empty   { text-align: center; padding: 60px 20px; font-size: 14px; color: var(--muted); }
</style>
</head>
<body>

<!-- ログイン -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <div class="eyebrow">実行委員会専用</div>
    <h1>管理者ページ</h1>
    <div class="field">
      <label>パスワード</label>
      <input type="password" id="pw" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn-login" onclick="login()">ログイン</button>
    <div class="login-err" id="loginErr"></div>
    <a href="/" class="back-to-top">← トップに戻る</a>
  </div>
</div>

<!-- ダッシュボード -->
<div id="dashboard">
  <div class="topbar">
    <h1>管理者ダッシュボード</h1>
    <div class="topbar-actions">
      <button class="btn-sm" onclick="loadAll()">更新</button>
      <button class="btn-sm danger" onclick="logout()">ログアウト</button>
    </div>
  </div>

  <div class="content">
    <div class="stats">
      <div class="stat"><div class="num" id="sTotal">—</div><div class="lbl">出演者・グループ</div></div>
      <div class="stat"><div class="num" id="sMembers">—</div><div class="lbl">総メンバー数</div></div>
      <div class="stat"><div class="num" id="sResponded">—</div><div class="lbl">回答済み</div></div>
    </div>
    <div id="loading">読み込み中</div>
    <div id="list"></div>
  </div>
</div>

<script>
const DATES = [
  { key:'7/1', label:'7/1（水）' },
  { key:'7/2', label:'7/2（木）' },
  { key:'7/3', label:'7/3（金）' },
];
const TIMES = [];
TIMES.push({ start:'12:30', end:'13:00' });
for (let h = 15; h < 21; h++) {
  for (let m = 0; m < 60; m += 30) {
    const s = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    const eh = m===30 ? h+1 : h, em = m===30 ? 0 : 30;
    TIMES.push({ start:s, end:`${String(eh).padStart(2,'0')}:${String(em).padStart(2,'0')}` });
  }
}

function norm(v) {
  if (v === true  || v === 'yes')  return 'yes';
  if (v === 'maybe')               return 'maybe';
  if (v === false || v === 'no')   return 'no';
  return null;
}

async function login() {
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('loginErr');
  err.style.display = 'none';
  const res = await fetch('/api/admin/login', {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ password:pw })
  });
  if (res.ok) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadAll();
  } else {
    const d = await res.json();
    err.textContent = d.error || 'ログインに失敗しました';
    err.style.display = 'block';
  }
}

async function logout() {
  await fetch('/api/admin/logout', { method:'POST' });
  location.reload();
}

async function loadAll() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('list').innerHTML = '';
  const res = await fetch('/api/admin/all');
  if (!res.ok) { document.getElementById('loading').textContent = 'データ取得に失敗しました'; return; }
  const data = await res.json();
  document.getElementById('loading').style.display = 'none';

  const totalM    = data.reduce((s,g) => s + g.members.length, 0);
  const responded = data.reduce((s,g) => s + g.members.filter(m => Object.keys(m.slots).length > 0).length, 0);
  document.getElementById('sTotal').textContent    = data.length;
  document.getElementById('sMembers').textContent  = totalM;
  document.getElementById('sResponded').textContent = responded;

  if (!data.length) {
    document.getElementById('list').innerHTML = '<div class="empty">まだ登録された出演者がいません</div>';
    return;
  }

  const list = document.getElementById('list');
  data.forEach(group => {
    const card = document.createElement('div');
    card.className = 'performer-card';

    const codeHtml = group.code ? `<span class="badge badge-code">${group.code}</span>` : '';
    const typeHtml = `<span class="badge">${group.type === 'solo' ? 'ソロ' : 'グループ'}</span>`;

    const membersHtml = group.members.map(m => {
      const hasData = Object.keys(m.slots).length > 0;
      const upd = m.updatedAt
        ? new Date(m.updatedAt).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})
        : null;

      if (!hasData) {
        return `<div class="member-row">
          <div class="member-head">
            <div class="member-name">${group.type === 'group' ? m.name : ''}</div>
          </div>
          <span class="status-chip chip-na">未回答</span>
        </div>`;
      }

      const yes   = Object.values(m.slots).filter(v => norm(v)==='yes').length;
      const maybe = Object.values(m.slots).filter(v => norm(v)==='maybe').length;
      const no    = Object.values(m.slots).filter(v => norm(v)==='no').length;

      const dayColumns = DATES.map(date => {
        const slotLines = TIMES.map(t => {
          const key = `${date.key}_${t.start}`;
          const state = norm(m.slots[key]);
          const cls = state === 'yes' ? 's-yes' : state === 'maybe' ? 's-maybe' : state === 'no' ? 's-no' : 's-na';
          const lbl = state === 'yes' ? '○' : state === 'maybe' ? '△' : state === 'no' ? '✗' : '—';
          return `<div class="slot-line"><span class="slot-time">${t.start}</span><span class="${cls}">${lbl}</span></div>`;
        }).join('');
        return `<div class="day-col"><div class="day-head">${date.label}</div>${slotLines}</div>`;
      }).join('');

      return `<div class="member-row">
        <div class="member-head">
          <div class="member-name">${group.type === 'group' ? m.name : ''}</div>
          ${upd ? `<div class="updated-at">${upd} 更新</div>` : ''}
        </div>
        <div class="status-row">
          <span class="status-chip chip-yes">○ ${yes}枠</span>
          <span class="status-chip chip-maybe">△ ${maybe}枠</span>
          <span class="status-chip chip-no">✗ ${no}枠</span>
        </div>
        <div class="avail-grid">${dayColumns}</div>
      </div>`;
    }).join('');

    card.innerHTML = `
      <div class="card-head">
        <h2>${group.name}</h2>
        ${typeHtml}${codeHtml}
      </div>
      ${membersHtml}`;
    list.appendChild(card);
  });
}
</script>
</body>
</html>
