<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打ち合わせ日程調整</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f7f8;
    --surface: #ffffff;
    --border: #e4e4e7;
    --border-strong: #d4d4d8;
    --text: #18181b;
    --muted: #71717a;
    --accent: #18181b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    color: var(--text);
  }
  .wrap { width: 100%; max-width: 400px; }

  .eyebrow {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    margin-bottom: 20px;
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 32px; }

  .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
  .type-card {
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 18px 14px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    background: var(--surface);
    user-select: none;
  }
  .type-card:hover { border-color: var(--text); }
  .type-card.active { border-color: var(--text); background: #fafafa; }
  .type-card .icon { font-size: 26px; margin-bottom: 8px; }
  .type-card .name { font-size: 14px; font-weight: 600; color: var(--text); }
  .type-card .desc { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .panel { display: none; }
  .panel.show { display: block; }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; letter-spacing: 0.02em; }
  .field input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: var(--text); }

  .btn {
    width: 100%;
    padding: 12px;
    background: var(--text);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s;
    margin-top: 4px;
  }
  .btn:hover { opacity: 0.85; }
  .btn-ghost {
    background: none;
    color: var(--muted);
    border: 1.5px solid var(--border);
    margin-top: 8px;
  }
  .btn-ghost:hover { opacity: 1; border-color: var(--text); color: var(--text); }

  .divider { display: flex; align-items: center; gap: 10px; margin: 14px 0; color: var(--border-strong); font-size: 12px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .err { font-size: 12px; color: #dc2626; margin-top: 6px; display: none; }
  .join-link { display: block; text-align: center; font-size: 13px; color: var(--muted); cursor: pointer; margin-top: 10px; text-decoration: underline; text-underline-offset: 2px; }
  .join-link:hover { color: var(--text); }

  /* グループ一覧 */
  .group-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; max-height: 240px; overflow-y: auto; }
  .group-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
    background: var(--surface);
  }
  .group-item:hover { border-color: var(--text); }
  .group-item.selected { border-color: var(--text); background: #fafafa; }
  .group-item-name { font-size: 14px; font-weight: 600; }
  .group-item-count { font-size: 12px; color: var(--muted); }
  .no-groups { text-align: center; padding: 20px; font-size: 13px; color: var(--muted); border: 1.5px dashed var(--border); border-radius: 8px; }
  .loading-groups { text-align: center; padding: 16px; font-size: 13px; color: var(--muted); }

  .admin-link {
    display: block;
    text-align: center;
    margin-top: 32px;
    font-size: 12px;
    color: var(--border-strong);
    text-decoration: none;
  }
  .admin-link:hover { color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">文化祭ステージ実行委員会</div>
  <h1>打ち合わせ<br>候補日程フォーム</h1>
  <p class="subtitle">7月1日・2日・3日の空き時間を教えてください</p>

  <div class="type-grid">
    <div class="type-card" id="card-solo" onclick="selectType('solo')">
      <div class="icon">🎤</div>
      <div class="name">個人出演</div>
      <div class="desc">ソロ・個人</div>
    </div>
    <div class="type-card" id="card-group" onclick="selectType('group')">
      <div class="icon">🎸</div>
      <div class="name">グループ出演</div>
      <div class="desc">バンド・グループ</div>
    </div>
  </div>

  <!-- ソロ -->
  <div class="panel" id="panel-solo">
    <div class="field">
      <label>名前</label>
      <input id="soloName" type="text" placeholder="例：山田太郎" maxlength="30">
    </div>
    <button class="btn" onclick="registerSolo()">フォームへ進む</button>
    <div class="err" id="soloErr"></div>
  </div>

  <!-- グループ作成 -->
  <div class="panel" id="panel-create">
    <div class="field">
      <label>グループ名</label>
      <input id="groupName" type="text" placeholder="例：ロックバンドA" maxlength="30">
    </div>
    <div class="field">
      <label>あなたの名前</label>
      <input id="groupMember" type="text" placeholder="例：田中花子" maxlength="30">
    </div>
    <button class="btn" onclick="createGroup()">グループを作ってフォームへ</button>
    <div class="err" id="createErr"></div>
    <div class="divider">または</div>
    <button class="btn btn-ghost" onclick="switchSub('join')">既存のグループに参加する</button>
  </div>

  <!-- グループ参加 -->
  <div class="panel" id="panel-join">
    <div class="field">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
        <label style="margin:0">参加するグループを選択</label>
        <span onclick="loadGroupList()" style="font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline;text-underline-offset:2px;">再読み込み</span>
      </div>
      <div id="groupList" class="group-list"></div>
    </div>
    <div class="field" id="joinNameField" style="display:none">
      <label>あなたの名前</label>
      <input id="joinName" type="text" placeholder="例：鈴木次郎" maxlength="30">
    </div>
    <button class="btn" id="joinBtn" onclick="joinGroup()" style="display:none">参加してフォームへ</button>
    <div class="err" id="joinErr"></div>
    <span class="join-link" onclick="switchSub('create')">← グループを新しく作る</span>
  </div>

  <a href="/admin.html" class="admin-link">管理者ページ →</a>
</div>

<script>
let currentType = null;

function selectType(type) {
  currentType = type;
  ['solo','group'].forEach(t => document.getElementById('card-' + t).classList.toggle('active', t === type));
  ['solo','create','join'].forEach(p => document.getElementById('panel-' + p).classList.remove('show'));
  document.getElementById(type === 'solo' ? 'panel-solo' : 'panel-create').classList.add('show');
  if (type === 'group') loadGroupList(); // バックグラウンドで先読み
}

let selectedGroupCode = null;

function switchSub(sub) {
  ['create','join'].forEach(p => document.getElementById('panel-' + p).classList.remove('show'));
  document.getElementById('panel-' + sub).classList.add('show');
  if (sub === 'join') loadGroupList();
}

async function loadGroupList() {
  const container = document.getElementById('groupList');
  container.innerHTML = '<div class="loading-groups">読み込み中…</div>';
  selectedGroupCode = null;
  document.getElementById('joinNameField').style.display = 'none';
  document.getElementById('joinBtn').style.display = 'none';

  const res = await fetch('/api/groups');
  const groups = await res.json();

  if (!groups.length) {
    container.innerHTML = '<div class="no-groups">まだグループが登録されていません。<br>先に代表者がグループを作成してください。</div>';
    return;
  }

  container.innerHTML = '';
  groups.forEach(g => {
    const item = document.createElement('div');
    item.className = 'group-item';
    item.innerHTML = `<span class="group-item-name">${g.name}</span><span class="group-item-count">${g.memberCount}人参加中</span>`;
    item.onclick = () => {
      document.querySelectorAll('.group-item').forEach(el => el.classList.remove('selected'));
      item.classList.add('selected');
      selectedGroupCode = g.code;
      document.getElementById('joinNameField').style.display = 'block';
      document.getElementById('joinBtn').style.display = 'block';
      document.getElementById('joinName').focus();
    };
    container.appendChild(item);
  });
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
}

async function registerSolo() {
  const name = document.getElementById('soloName').value.trim();
  if (!name) { showErr('soloErr', '名前を入力してください'); return; }
  document.getElementById('soloErr').style.display = 'none';
  const res = await fetch('/api/register/solo', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name}) });
  const d = await res.json();
  if (!res.ok) { showErr('soloErr', d.error); return; }
  location.href = `/form.html?token=${d.token}`;
}

async function createGroup() {
  const groupName = document.getElementById('groupName').value.trim();
  const memberName = document.getElementById('groupMember').value.trim();
  if (!groupName || !memberName) { showErr('createErr', 'グループ名と名前を入力してください'); return; }
  document.getElementById('createErr').style.display = 'none';
  const res = await fetch('/api/register/group', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({groupName, memberName}) });
  const d = await res.json();
  if (!res.ok) { showErr('createErr', d.error); return; }
  location.href = `/form.html?token=${d.token}&code=${d.groupCode}`;
}

async function joinGroup() {
  const name = document.getElementById('joinName').value.trim();
  if (!selectedGroupCode) { showErr('joinErr', 'グループを選択してください'); return; }
  if (!name) { showErr('joinErr', '名前を入力してください'); return; }
  document.getElementById('joinErr').style.display = 'none';
  const res = await fetch(`/api/join/${selectedGroupCode}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name}) });
  const d = await res.json();
  if (!res.ok) { showErr('joinErr', d.error); return; }
  location.href = `/form.html?token=${d.token}&code=${d.groupCode}`;
}
</script>
</body>
</html>
