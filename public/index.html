<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文化祭 打ち合わせ日程調整</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .container { background: white; border-radius: 16px; padding: 32px 24px; max-width: 420px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  h1 { font-size: 20px; color: #1a1a2e; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 28px; }
  .section { margin-bottom: 24px; }
  .section-title { font-size: 13px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .btn { display: block; width: 100%; padding: 14px; border-radius: 10px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; text-align: center; text-decoration: none; }
  .btn-primary { background: #4f46e5; color: white; }
  .btn-primary:hover { background: #4338ca; }
  .btn-secondary { background: #f3f4f6; color: #374151; margin-top: 10px; }
  .btn-secondary:hover { background: #e5e7eb; }
  .btn-outline { background: white; color: #4f46e5; border: 2px solid #4f46e5; margin-top: 10px; }
  .btn-outline:hover { background: #eef2ff; }
  input { width: 100%; padding: 12px 14px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 15px; margin-bottom: 10px; outline: none; transition: border-color 0.15s; }
  input:focus { border-color: #4f46e5; }
  .error { color: #dc2626; font-size: 13px; margin-top: 6px; display: none; }
  .divider { border: none; border-top: 1px solid #f0f0f0; margin: 20px 0; }
  .admin-link { display: block; text-align: center; margin-top: 24px; font-size: 13px; color: #aaa; text-decoration: none; }
  .admin-link:hover { color: #666; }
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab { flex: 1; padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px; background: white; cursor: pointer; font-size: 13px; font-weight: 600; color: #6b7280; transition: all 0.15s; }
  .tab.active { border-color: #4f46e5; color: #4f46e5; background: #eef2ff; }
  .panel { display: none; }
  .panel.active { display: block; }
  .tag { display: inline-block; background: #fef3c7; color: #92400e; font-size: 12px; font-weight: 600; padding: 3px 8px; border-radius: 4px; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="container">
  <h1>🎭 打ち合わせ候補日程フォーム</h1>
  <p class="subtitle">文化祭ステージ実行委員会</p>

  <!-- ソロ -->
  <div class="section">
    <div class="section-title">ソロ出演の方</div>
    <input type="text" id="soloName" placeholder="あなたの名前" maxlength="30">
    <button class="btn btn-primary" onclick="registerSolo()">回答フォームへ進む</button>
    <div class="error" id="soloError"></div>
  </div>

  <hr class="divider">

  <!-- グループ -->
  <div class="section">
    <div class="section-title">グループ出演の方</div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('create')">グループを作る</button>
      <button class="tab" onclick="switchTab('join')">グループに合流する</button>
    </div>

    <!-- グループ作成 -->
    <div class="panel active" id="panel-create">
      <span class="tag">代表者が先に登録</span>
      <input type="text" id="groupName" placeholder="グループ名（例：ロックバンドA）" maxlength="30">
      <input type="text" id="groupMemberName" placeholder="あなたの名前" maxlength="30">
      <button class="btn btn-primary" onclick="createGroup()">グループを作成して進む</button>
      <div class="error" id="createError"></div>
    </div>

    <!-- グループ参加 -->
    <div class="panel" id="panel-join">
      <span class="tag">代表者からコードをもらって入力</span>
      <input type="text" id="joinCode" placeholder="グループコード（例：AB3XY）" maxlength="6" style="text-transform:uppercase">
      <input type="text" id="joinMemberName" placeholder="あなたの名前" maxlength="30">
      <button class="btn btn-primary" onclick="joinGroup()">グループに参加して進む</button>
      <div class="error" id="joinError"></div>
    </div>
  </div>

  <a href="/admin.html" class="admin-link">管理者ページ</a>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

async function registerSolo() {
  const name = document.getElementById('soloName').value.trim();
  const err = document.getElementById('soloError');
  if (!name) { showError(err, '名前を入力してください'); return; }
  err.style.display = 'none';

  const res = await fetch('/api/register/solo', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name })
  });
  const data = await res.json();
  if (!res.ok) { showError(err, data.error); return; }
  location.href = `/form.html?token=${data.token}`;
}

async function createGroup() {
  const groupName = document.getElementById('groupName').value.trim();
  const memberName = document.getElementById('groupMemberName').value.trim();
  const err = document.getElementById('createError');
  if (!groupName || !memberName) { showError(err, 'グループ名と名前を入力してください'); return; }
  err.style.display = 'none';

  const res = await fetch('/api/register/group', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ groupName, memberName })
  });
  const data = await res.json();
  if (!res.ok) { showError(err, data.error); return; }
  location.href = `/form.html?token=${data.token}&code=${data.groupCode}`;
}

async function joinGroup() {
  const code = document.getElementById('joinCode').value.trim().toUpperCase();
  const name = document.getElementById('joinMemberName').value.trim();
  const err = document.getElementById('joinError');
  if (!code || !name) { showError(err, 'コードと名前を入力してください'); return; }
  err.style.display = 'none';

  const res = await fetch(`/api/join/${code}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name })
  });
  const data = await res.json();
  if (!res.ok) { showError(err, data.error); return; }
  location.href = `/form.html?token=${data.token}&code=${data.groupCode}`;
}

function showError(el, msg) {
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
