<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打ち合わせ日程フォーム</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f0f2f5; min-height: 100vh; user-select: none; -webkit-user-select: none; }

  .topbar { background: white; border-bottom: 1px solid #e5e7eb; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 15px; flex-shrink: 0; }
  .user-info h2 { font-size: 15px; font-weight: 700; color: #1a1a2e; }
  .user-info .group-tag { font-size: 11px; color: #7c3aed; font-weight: 600; }
  .btn-gcal { display: flex; align-items: center; gap: 5px; background: white; border: 1.5px solid #e5e7eb; border-radius: 8px; padding: 7px 11px; font-size: 12px; font-weight: 600; color: #4285f4; cursor: pointer; text-decoration: none; white-space: nowrap; }
  .btn-gcal:hover { background: #f0f7ff; border-color: #4285f4; }

  .code-banner { background: linear-gradient(135deg, #ede9fe, #ddd6fe); border-bottom: 1px solid #c4b5fd; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; }
  .code-banner .label { font-size: 12px; color: #6d28d9; font-weight: 600; }
  .code-banner .code { font-size: 20px; font-weight: 800; color: #4c1d95; letter-spacing: 3px; font-family: monospace; }
  .code-banner .share-hint { font-size: 11px; color: #7c3aed; }
  .btn-group-view { background: #7c3aed; color: white; border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; }

  .legend { padding: 10px 20px; background: white; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 14px; font-size: 12px; color: #555; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-weight: 600; }
  .lc { width: 26px; height: 22px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
  .lc-yes  { background: #22c55e; color: white; }
  .lc-maybe { background: #f59e0b; color: white; }
  .lc-no   { background: #fecaca; color: #dc2626; }
  .hint-drag { font-size: 11px; color: #aaa; margin-left: auto; }

  .calendar-wrap { padding: 14px 14px 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .calendar { min-width: 300px; width: 100%; border-collapse: separate; border-spacing: 0; }

  .calendar thead th { padding: 0; text-align: center; }
  .calendar thead th.corner { width: 64px; min-width: 64px; }
  .day-header { background: white; border-radius: 12px 12px 0 0; padding: 10px 6px 8px; margin: 0 3px; display: block; }
  .day-name { font-size: 10px; font-weight: 600; color: #aaa; }
  .day-date { font-size: 22px; font-weight: 800; color: #1a1a2e; line-height: 1; margin: 2px 0; }
  .day-dow { font-size: 11px; font-weight: 700; }
  .wed { color: #3b82f6; } .thu { color: #8b5cf6; } .fri { color: #ef4444; }

  .calendar tbody tr td { padding: 2px 3px; }
  .calendar tbody tr td.time-col { padding: 2px 6px 2px 0; text-align: right; vertical-align: middle; }
  .time-label { font-size: 11px; color: #9ca3af; font-weight: 500; white-space: nowrap; }

  .slot-cell {
    width: 100%; height: 46px; border-radius: 7px; border: 1.5px solid #e5e7eb;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; transition: transform 0.08s, box-shadow 0.08s;
    touch-action: none;
  }
  .slot-cell:active { transform: scale(0.95); }

  .state-yes   { background: #22c55e; border-color: #16a34a; color: white; box-shadow: 0 2px 8px rgba(34,197,94,0.3); }
  .state-maybe { background: #f59e0b; border-color: #d97706; color: white; box-shadow: 0 2px 8px rgba(245,158,11,0.3); }
  .state-no    { background: #fef2f2; border-color: #fca5a5; color: #ef4444; }
  .state-empty { background: white; border-color: #e5e7eb; color: transparent; }

  .slot-cell.dragging-over { transform: scale(1.08); }

  .section-header td { padding: 10px 3px 4px; }
  .section-label { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; padding: 5px 10px; border-radius: 6px; }
  .section-label.lunch { background: #fef9c3; color: #a16207; }
  .section-label.evening { background: #ede9fe; color: #6d28d9; }

  .submit-area { position: sticky; bottom: 0; background: white; border-top: 1px solid #e5e7eb; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
  .submit-counts { flex: 1; display: flex; gap: 10px; font-size: 13px; font-weight: 700; }
  .cnt-yes   { color: #16a34a; }
  .cnt-maybe { color: #d97706; }
  .cnt-no    { color: #ef4444; }
  .btn-submit { padding: 12px 22px; background: linear-gradient(135deg, #22c55e, #16a34a); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(34,197,94,0.3); white-space: nowrap; }
  .btn-submit:hover { transform: translateY(-1px); }
  .btn-submit:disabled { background: #d1d5db; box-shadow: none; transform: none; cursor: not-allowed; }

  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 100px; font-size: 14px; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 100; }
  .toast.success { background: #1a1a2e; color: white; }
  .toast.error-t { background: #dc2626; color: white; }
  .toast.show { opacity: 1; }

  .error-page { text-align: center; padding: 80px 20px; }
  .error-page h2 { font-size: 20px; color: #dc2626; margin-bottom: 10px; }
  .back-btn { display: inline-block; margin-top: 16px; padding: 12px 24px; background: #6366f1; color: white; border-radius: 10px; text-decoration: none; font-weight: 700; }

  @media (max-width: 380px) {
    .slot-cell { height: 40px; font-size: 17px; }
    .calendar-wrap { padding: 10px 6px 0; }
  }
</style>
</head>
<body>

<div id="loading" style="text-align:center;padding:80px 20px;color:#888;">読み込み中...</div>
<div id="errorPage" class="error-page" style="display:none">
  <h2>リンクが無効です</h2>
  <p>URLが正しくないか、有効期限が切れています。</p>
  <a href="/" class="back-btn">トップに戻る</a>
</div>

<div id="app" style="display:none">
  <div class="topbar">
    <div class="topbar-left">
      <div class="user-avatar" id="avatarChar"></div>
      <div class="user-info">
        <h2 id="displayName"></h2>
        <div class="group-tag" id="groupTag"></div>
      </div>
    </div>
    <a href="https://calendar.google.com" target="_blank" class="btn-gcal">📅 自分のGoogleカレンダーを確認する</a>
  </div>

  <div class="code-banner" id="codeBanner" style="display:none">
    <div>
      <div class="label">グループコード（メンバーに共有）</div>
      <div class="code" id="groupCode"></div>
      <div class="share-hint">このコードで他メンバーが参加できます</div>
    </div>
    <a id="groupViewBtn" class="btn-group-view" href="#">👥 全員の回答を見る</a>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="lc lc-yes">○</div>参加できる</div>
    <div class="legend-item"><div class="lc lc-maybe">△</div>たぶん大丈夫</div>
    <div class="legend-item"><div class="lc lc-no">✗</div>参加できない</div>
    <div class="legend-item"><div class="lc" style="background:white;border:1.5px solid #e5e7eb;"></div>未選択</div>
    <span class="hint-drag">ドラッグで一括入力</span>
  </div>

  <div class="calendar-wrap">
    <table class="calendar">
      <thead>
        <tr>
          <th class="corner"></th>
          <th><div class="day-header"><div class="day-name">7月</div><div class="day-date">1</div><div class="day-dow wed">水</div></div></th>
          <th><div class="day-header"><div class="day-name">7月</div><div class="day-date">2</div><div class="day-dow thu">木</div></div></th>
          <th><div class="day-header"><div class="day-name">7月</div><div class="day-date">3</div><div class="day-dow fri">金</div></div></th>
        </tr>
      </thead>
      <tbody id="calBody"></tbody>
    </table>
  </div>

  <div class="submit-area">
    <div class="submit-counts">
      <span class="cnt-yes">○ <span id="cntYes">0</span></span>
      <span class="cnt-maybe">△ <span id="cntMaybe">0</span></span>
      <span class="cnt-no">✗ <span id="cntNo">0</span></span>
    </div>
    <button class="btn-submit" id="submitBtn" onclick="save()">保存する</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DATES = ['7/1', '7/2', '7/3'];
const TIMES = [];
TIMES.push({ start: '12:30', end: '13:00' });
for (let h = 15; h < 21; h++) {
  for (let m = 0; m < 60; m += 30) {
    const s = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    const eh = m === 30 ? h + 1 : h, em = m === 30 ? 0 : 30;
    TIMES.push({ start: s, end: `${String(eh).padStart(2,'0')}:${String(em).padStart(2,'0')}` });
  }
}

const params = new URLSearchParams(location.search);
const TOKEN = params.get('token');
const GROUP_CODE = params.get('code');
let slots = {};

// 状態サイクル: empty → yes → maybe → no → empty
const NEXT = { empty: 'yes', yes: 'maybe', maybe: 'no', no: 'empty' };
const LABELS = { yes: '○', maybe: '△', no: '✗', empty: '' };

function getState(key) { return slots[key] || 'empty'; }

function applyToCell(el, key, state) {
  slots[key] = state;
  el.className = `slot-cell state-${state}`;
  el.textContent = LABELS[state];
  updateCounts();
}

function updateCounts() {
  const yes   = Object.values(slots).filter(v => v === 'yes').length;
  const maybe = Object.values(slots).filter(v => v === 'maybe').length;
  const no    = Object.values(slots).filter(v => v === 'no').length;
  document.getElementById('cntYes').textContent = yes;
  document.getElementById('cntMaybe').textContent = maybe;
  document.getElementById('cntNo').textContent = no;
}

// ドラッグ管理
let isDragging = false;
let dragTargetState = null;

function startDrag(el, key) {
  isDragging = true;
  dragTargetState = NEXT[getState(key)];
  applyToCell(el, key, dragTargetState);
}

function onEnterCell(el, key) {
  if (!isDragging) return;
  applyToCell(el, key, dragTargetState);
}

function endDrag() { isDragging = false; dragTargetState = null; }

function buildGrid() {
  const tbody = document.getElementById('calBody');
  tbody.innerHTML = '';

  // 昼ヘッダー
  const lunchHdr = document.createElement('tr');
  lunchHdr.className = 'section-header';
  lunchHdr.innerHTML = `<td colspan="4"><div class="section-label lunch">☀️ 昼の部</div></td>`;
  tbody.appendChild(lunchHdr);

  TIMES.forEach((time, i) => {
    // 夜ヘッダー（12:30の次 = i===1）
    if (i === 1) {
      const nightHdr = document.createElement('tr');
      nightHdr.className = 'section-header';
      nightHdr.innerHTML = `<td colspan="4"><div class="section-label evening">🌙 夜の部</div></td>`;
      tbody.appendChild(nightHdr);
    }

    const tr = document.createElement('tr');
    const tdT = document.createElement('td');
    tdT.className = 'time-col';
    tdT.innerHTML = `<span class="time-label">${time.start}</span>`;
    tr.appendChild(tdT);

    DATES.forEach(date => {
      const key = `${date}_${time.start}`;
      const state = getState(key);
      const td = document.createElement('td');
      const cell = document.createElement('div');
      cell.className = `slot-cell state-${state}`;
      cell.textContent = LABELS[state];
      cell.dataset.key = key;

      // マウス
      cell.addEventListener('mousedown', e => { e.preventDefault(); startDrag(cell, key); });
      cell.addEventListener('mouseenter', () => onEnterCell(cell, key));

      // タッチ
      cell.addEventListener('touchstart', e => {
        e.preventDefault();
        startDrag(cell, key);
      }, { passive: false });

      td.appendChild(cell);
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  updateCounts();
}

// タッチドラッグ: 指の移動先のセルを探す
document.addEventListener('touchmove', e => {
  if (!isDragging) return;
  e.preventDefault();
  const touch = e.touches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const cell = el?.closest('.slot-cell');
  if (cell && cell.dataset.key) {
    onEnterCell(cell, cell.dataset.key);
  }
}, { passive: false });

document.addEventListener('touchend', endDrag);
document.addEventListener('mouseup', endDrag);

async function save() {
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '保存中...';

  const res = await fetch(`/api/availability/${TOKEN}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ slots })
  });

  btn.disabled = false;
  btn.textContent = '保存する';
  if (res.ok) toast('✅ 回答を保存しました！', 'success');
  else toast('❌ エラーが発生しました', 'error-t');
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 2800);
}

async function init() {
  if (!TOKEN) { showError(); return; }

  const [meRes, availRes] = await Promise.all([
    fetch(`/api/me/${TOKEN}`),
    fetch(`/api/availability/${TOKEN}`)
  ]);
  if (!meRes.ok) { showError(); return; }

  const me = await meRes.json();
  document.getElementById('avatarChar').textContent = me.name[0];
  document.getElementById('displayName').textContent = me.name + ' さん';

  if (me.type === 'group' && me.groupName) {
    document.getElementById('groupTag').textContent = `グループ: ${me.groupName}`;
    const code = GROUP_CODE || me.groupCode;
    document.getElementById('groupCode').textContent = code;
    document.getElementById('codeBanner').style.display = 'flex';
    document.getElementById('groupViewBtn').href = `/group.html?code=${code}&token=${TOKEN}`;
  }

  if (availRes.ok) {
    const avail = await availRes.json();
    // 旧データ(true/false)を新形式に変換
    const raw = avail.slots || {};
    Object.entries(raw).forEach(([k, v]) => {
      if (v === true) slots[k] = 'yes';
      else if (v === false || v === 'no') slots[k] = 'no';
      else slots[k] = v;
    });
  }

  buildGrid();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

function showError() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('errorPage').style.display = 'block';
}

init();
</script>
</body>
</html>
