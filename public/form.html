<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打ち合わせ日程フォーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f7f8;
    --surface: #ffffff;
    --border: #e4e4e7;
    --text: #18181b;
    --muted: #71717a;
    --yes: #16a34a;
    --yes-bg: #dcfce7;
    --maybe: #d97706;
    --maybe-bg: #fef3c7;
    --no: #dc2626;
    --no-bg: #fee2e2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
    user-select: none;
    -webkit-user-select: none;
  }

  /* トップバー */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .user-row { display: flex; align-items: center; gap: 10px; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--text);
    color: white; font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .user-name { font-size: 14px; font-weight: 600; }
  .user-group { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .gcal-btn {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 500; color: var(--muted);
    text-decoration: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    background: var(--surface);
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .gcal-btn:hover { color: var(--text); border-color: #a1a1aa; }

  /* グループコードバー */
  .code-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .code-bar.show { display: flex; }
  .code-label { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .code-value { font-size: 16px; font-weight: 700; letter-spacing: 3px; font-family: 'Inter', monospace; }
  .code-hint { font-size: 11px; color: var(--muted); }
  .group-view-btn {
    font-size: 12px; font-weight: 600; color: var(--text);
    border: 1.5px solid var(--border); border-radius: 6px;
    padding: 6px 12px; text-decoration: none; white-space: nowrap;
    transition: border-color 0.15s;
  }
  .group-view-btn:hover { border-color: var(--text); }

  /* 凡例 */
  .legend {
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
  .ldot { width: 20px; height: 18px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
  .ldot-yes   { background: var(--yes-bg); color: var(--yes); }
  .ldot-maybe { background: var(--maybe-bg); color: var(--maybe); }
  .ldot-no    { background: var(--no-bg); color: var(--no); }
  .ldot-empty { background: var(--surface); border: 1px solid var(--border); }
  .legend-hint { font-size: 11px; color: #a1a1aa; margin-left: auto; }

  /* カレンダー */
  .cal-wrap { padding: 16px 14px 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .cal { width: 100%; border-collapse: separate; border-spacing: 0; }

  .cal thead th { padding: 0; text-align: center; }
  .cal thead th.corner { width: 62px; min-width: 62px; }
  .day-col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    padding: 10px 6px 8px;
    margin: 0 3px;
    display: block;
  }
  .day-month { font-size: 10px; color: var(--muted); font-weight: 500; }
  .day-num { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; margin: 2px 0; }
  .day-dow { font-size: 11px; font-weight: 600; }
  .wed { color: #2563eb; } .thu { color: #7c3aed; } .fri { color: #dc2626; }

  .cal tbody td { padding: 2px 3px; }
  .cal tbody td.tc { padding: 2px 6px 2px 0; text-align: right; vertical-align: middle; }
  .tlabel { font-size: 11px; color: #a1a1aa; white-space: nowrap; }

  /* セクションヘッダー */
  .sec-row td { padding: 12px 3px 4px; }
  .sec-label {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600; color: var(--muted);
    letter-spacing: 0.04em; text-transform: uppercase;
    padding: 4px 0;
  }
  .sec-dot { width: 6px; height: 6px; border-radius: 50%; }
  .sec-dot-day { background: #f59e0b; }
  .sec-dot-night { background: #6366f1; }

  /* セル */
  .cell {
    width: 100%; height: 44px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700;
    transition: border-color 0.1s, background 0.1s;
    touch-action: none;
  }
  .cell:hover { border-color: #a1a1aa; }
  .s-yes   { background: var(--yes-bg); border-color: #86efac; color: var(--yes); }
  .s-maybe { background: var(--maybe-bg); border-color: #fcd34d; color: var(--maybe); }
  .s-no    { background: var(--no-bg); border-color: #fca5a5; color: var(--no); }

  /* 送信バー */
  .submit-bar {
    position: sticky; bottom: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex; align-items: center; gap: 12px;
  }
  .counts { display: flex; gap: 10px; }
  .cnt { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
  .cnt-yes   { color: var(--yes); }
  .cnt-maybe { color: var(--maybe); }
  .cnt-no    { color: var(--no); }
  .cnt-dot { width: 8px; height: 8px; border-radius: 50%; }
  .cnt-dot-yes   { background: var(--yes); }
  .cnt-dot-maybe { background: var(--maybe); }
  .cnt-dot-no    { background: var(--no); }

  .save-btn {
    margin-left: auto;
    padding: 10px 22px;
    background: var(--text);
    color: white;
    border: none;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .save-btn:hover { opacity: 0.8; }
  .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* トースト */
  .toast {
    position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: white;
    padding: 10px 20px; border-radius: 100px;
    font-size: 13px; font-weight: 500;
    opacity: 0; transition: opacity 0.25s;
    pointer-events: none; white-space: nowrap; z-index: 100;
  }
  .toast.show { opacity: 1; }

  .error-page { text-align: center; padding: 80px 20px; }
  .error-page h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .error-page p { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
  .back-link { color: var(--text); font-weight: 600; font-size: 14px; }

  @media (max-width: 360px) {
    .cell { height: 38px; font-size: 14px; }
  }
</style>
</head>
<body>

<div id="loading" style="text-align:center;padding:80px 20px;color:#a1a1aa;font-size:14px;">読み込み中</div>

<div id="errorPage" class="error-page" style="display:none">
  <h2>リンクが無効です</h2>
  <p>URLが正しくないか、期限が切れています</p>
  <a href="/" class="back-link">トップへ戻る</a>
</div>

<div id="app" style="display:none">
  <div class="topbar">
    <div class="user-row">
      <div class="avatar" id="avatarChar"></div>
      <div>
        <div class="user-name" id="displayName"></div>
        <div class="user-group" id="groupTag"></div>
      </div>
    </div>
    <a href="https://calendar.google.com" target="_blank" class="gcal-btn">
      📅 自分のGoogleカレンダーを確認する
    </a>
  </div>

  <div class="code-bar" id="codeBanner">
    <div>
      <div class="code-label">グループコード — 他のメンバーに共有</div>
      <div class="code-value" id="groupCode"></div>
    </div>
    <a id="groupViewBtn" class="group-view-btn" href="#">全員の回答を見る →</a>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="ldot ldot-yes">○</div>参加できる</div>
    <div class="legend-item"><div class="ldot ldot-maybe">△</div>たぶん大丈夫</div>
    <div class="legend-item"><div class="ldot ldot-no">✗</div>参加できない</div>
    <div class="legend-item"><div class="ldot ldot-empty"></div>未選択</div>
    <span class="legend-hint">ドラッグで一括入力</span>
  </div>

  <div class="cal-wrap">
    <table class="cal">
      <thead>
        <tr>
          <th class="corner"></th>
          <th><div class="day-col"><div class="day-month">7月</div><div class="day-num">1</div><div class="day-dow wed">水</div></div></th>
          <th><div class="day-col"><div class="day-month">7月</div><div class="day-num">2</div><div class="day-dow thu">木</div></div></th>
          <th><div class="day-col"><div class="day-month">7月</div><div class="day-num">3</div><div class="day-dow fri">金</div></div></th>
        </tr>
      </thead>
      <tbody id="calBody"></tbody>
    </table>
  </div>

  <div class="submit-bar">
    <div class="counts">
      <div class="cnt cnt-yes"><div class="cnt-dot cnt-dot-yes"></div>○ <span id="cntYes">0</span></div>
      <div class="cnt cnt-maybe"><div class="cnt-dot cnt-dot-maybe"></div>△ <span id="cntMaybe">0</span></div>
      <div class="cnt cnt-no"><div class="cnt-dot cnt-dot-no"></div>✗ <span id="cntNo">0</span></div>
    </div>
    <button class="save-btn" id="saveBtn" onclick="save()">保存する</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DATES = ['7/1','7/2','7/3'];
const TIMES = [];
TIMES.push({ start:'12:30', end:'13:00' });
for (let h = 15; h < 21; h++) {
  for (let m = 0; m < 60; m += 30) {
    const s = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    const eh = m===30 ? h+1 : h, em = m===30 ? 0 : 30;
    TIMES.push({ start:s, end:`${String(eh).padStart(2,'0')}:${String(em).padStart(2,'0')}` });
  }
}

const params = new URLSearchParams(location.search);
const TOKEN = params.get('token');
const GROUP_CODE = params.get('code');
let slots = {};

const NEXT   = { empty:'yes', yes:'maybe', maybe:'no', no:'empty' };
const LABELS = { yes:'○', maybe:'△', no:'✗', empty:'' };
const CLS    = { yes:'s-yes', maybe:'s-maybe', no:'s-no', empty:'' };

function getState(key) { return slots[key] || 'empty'; }

function applyCell(el, key, state) {
  slots[key] = state;
  el.className = `cell ${CLS[state]}`;
  el.textContent = LABELS[state];
  updateCounts();
}

function updateCounts() {
  const v = Object.values(slots);
  document.getElementById('cntYes').textContent   = v.filter(x => x==='yes').length;
  document.getElementById('cntMaybe').textContent = v.filter(x => x==='maybe').length;
  document.getElementById('cntNo').textContent    = v.filter(x => x==='no').length;
}

let dragging = false, dragState = null;

function startDrag(el, key) {
  dragging = true;
  dragState = NEXT[getState(key)];
  applyCell(el, key, dragState);
}
function enterCell(el, key) {
  if (!dragging) return;
  applyCell(el, key, dragState);
}
function endDrag() { dragging = false; dragState = null; }

function buildGrid() {
  const tbody = document.getElementById('calBody');
  tbody.innerHTML = '';

  const makeSection = (emoji, label, dotClass) => {
    const tr = document.createElement('tr');
    tr.className = 'sec-row';
    tr.innerHTML = `<td colspan="4"><div class="sec-label"><span class="sec-dot ${dotClass}"></span>${emoji} ${label}</div></td>`;
    return tr;
  };

  tbody.appendChild(makeSection('☀️', '昼の部', 'sec-dot-day'));

  TIMES.forEach((time, i) => {
    if (i === 1) tbody.appendChild(makeSection('🌙', '夜の部', 'sec-dot-night'));

    const tr = document.createElement('tr');
    const tdT = document.createElement('td');
    tdT.className = 'tc';
    tdT.innerHTML = `<span class="tlabel">${time.start}</span>`;
    tr.appendChild(tdT);

    DATES.forEach(date => {
      const key = `${date}_${time.start}`;
      const state = getState(key);
      const td = document.createElement('td');
      const cell = document.createElement('div');
      cell.className = `cell ${CLS[state]}`;
      cell.textContent = LABELS[state];
      cell.dataset.key = key;
      cell.addEventListener('mousedown', e => { e.preventDefault(); startDrag(cell, key); });
      cell.addEventListener('mouseenter', () => enterCell(cell, key));
      cell.addEventListener('touchstart', e => { e.preventDefault(); startDrag(cell, key); }, { passive:false });
      td.appendChild(cell);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  updateCounts();
}

document.addEventListener('touchmove', e => {
  if (!dragging) return;
  e.preventDefault();
  const el = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY)?.closest('.cell');
  if (el?.dataset?.key) enterCell(el, el.dataset.key);
}, { passive:false });
document.addEventListener('touchend', endDrag);
document.addEventListener('mouseup', endDrag);

async function save() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '保存中…';
  const res = await fetch(`/api/availability/${TOKEN}`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ slots })
  });
  btn.disabled = false; btn.textContent = '保存する';
  showToast(res.ok ? '保存しました' : 'エラーが発生しました');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

async function init() {
  if (!TOKEN) { showErr(); return; }
  const [meRes, availRes] = await Promise.all([
    fetch(`/api/me/${TOKEN}`),
    fetch(`/api/availability/${TOKEN}`)
  ]);
  if (!meRes.ok) { showErr(); return; }
  const me = await meRes.json();

  document.getElementById('avatarChar').textContent = me.name[0];
  document.getElementById('displayName').textContent = me.name;
  if (me.type === 'group' && me.groupName) {
    document.getElementById('groupTag').textContent = me.groupName;
    const code = GROUP_CODE || me.groupCode;
    document.getElementById('groupCode').textContent = code;
    document.getElementById('codeBanner').classList.add('show');
    document.getElementById('groupViewBtn').href = `/group.html?code=${code}&token=${TOKEN}`;
  }

  if (availRes.ok) {
    const raw = (await availRes.json()).slots || {};
    Object.entries(raw).forEach(([k,v]) => {
      slots[k] = v === true ? 'yes' : v === false ? 'no' : v;
    });
  }

  buildGrid();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

function showErr() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('errorPage').style.display = 'block';
}

init();
</script>
</body>
</html>
